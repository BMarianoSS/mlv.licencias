<app-modal-wrapper title="Datos del representante legal" width="520px" maxHeight="90vh" [showCerrarBtn]="false" (cerrar)="cerrar.emit()" bodyClass="p-0">
  <div class="px-6 py-5">
    <div class="flex items-start gap-2.5 bg-[#E8F0FE] border border-[#1A6DB5]/20 rounded-lg px-4 py-3 mb-5">
      <span class="material-icons text-[#1A6DB5] text-[16px] flex-shrink-0 mt-0.5">info</span>
      <p class="text-xs text-[#0F2D5C] leading-relaxed">
        Los datos del representante legal deben coincidir con los documentos legales de la empresa.
      </p>
    </div>

    <div class="grid grid-cols-2 gap-4">

      <app-form-field label="Tipo documento" type="select" [required]="true" [(ngModel)]="rep.tipoDoc">
        <option *ngFor="let tipo of tipoDocumentos" [value]="tipo.idTipoDoc">{{ tipo.descDocumento }}</option>
      </app-form-field>

      <app-form-field label="N° documento" [required]="true" [maxlength]="11"
        [(ngModel)]="rep.nroDoc" (ngModelChange)="soloNumeros($event, 'nroDoc')">
      </app-form-field>

      <div class="col-span-2">
        <app-form-field label="Nombre completo" [required]="true" [(ngModel)]="rep.nombreRL"></app-form-field>
      </div>

      <div class="col-span-2">
        <app-form-field label="N° Partida" [(ngModel)]="rep.nroPartida"></app-form-field>
      </div>

      <app-form-field label="Teléfono" type="tel" [maxlength]="9"
        [(ngModel)]="rep.telefono" (ngModelChange)="soloNumeros($event, 'telefono')">
      </app-form-field>

    </div>
  </div>

  <div slot="footer" class="flex gap-2">
    <button (click)="cerrar.emit()"
      class="cursor-pointer inline-flex items-center gap-1.5 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm font-medium px-4 py-2 rounded-lg transition">
      Cancelar
    </button>
    <button (click)="guardar()"
      class="cursor-pointer inline-flex items-center gap-1.5 bg-[#1A6DB5] hover:bg-[#0F2D5C] text-white text-sm font-semibold px-5 py-2 rounded-lg transition">
      <span class="material-icons text-[15px]">save</span>
      Guardar
    </button>
  </div>
</app-modal-wrapper>
