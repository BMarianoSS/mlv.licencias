<app-modal-wrapper 
  title="Datos del representante" 
  width="550px" 
  maxHeight="90vh"
  [showCerrarBtn]="false"
  (cerrar)="cerrar.emit()"
  bodyClass="p-5">

  <div class="grid grid-cols-2 gap-4">

    <app-form-field label="Tipo documento" type="select" [required]="true" [(ngModel)]="rep.tipoDoc">
      <option *ngFor="let tipo of tipoDocumentos" [value]="tipo.idTipoDoc">{{ tipo.descDocumento }}</option>
    </app-form-field>

    <app-form-field 
      label="N° documento" 
      [required]="true" 
      [maxlength]="11"
      [(ngModel)]="rep.nroDoc"
      (ngModelChange)="soloNumeros($event, 'nroDoc')">
    </app-form-field>

    <div class="col-span-2">
      <app-form-field label="Nombre completo" [required]="true" [(ngModel)]="rep.nombreRL"></app-form-field>
    </div>

    <div class="col-span-2">
      <app-form-field label="N° Partida" [(ngModel)]="rep.nroPartida"></app-form-field>
    </div>

    <app-form-field 
      label="Teléfono" 
      type="tel" 
      [maxlength]="9"
      [(ngModel)]="rep.telefono"
      (ngModelChange)="soloNumeros($event, 'telefono')">
    </app-form-field>

  </div>

  <div slot="footer" class="flex gap-2">
    <button (click)="cerrar.emit()"
      class="inline-flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-4 py-2 rounded-lg transition">
      Cancelar
    </button>
    <button (click)="guardar()"
      class="inline-flex items-center gap-1.5 bg-blue-700 hover:bg-blue-800 text-blue-50 text-sm font-medium px-5 py-2 rounded-lg transition">
      Guardar
    </button>
  </div>

</app-modal-wrapper>
