<div class="p-6">
  <div *ngIf="mostrarModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center">
      <div [ngClass]="modalExito ? 'text-green-500' : 'text-red-500'" class="text-5xl mb-4">
        {{ modalExito ? '✅' : '❌' }}
      </div>
      <h2 class="text-lg font-bold text-gray-800 mb-2">
        {{ modalExito ? '¡Registro exitoso!' : 'Error en el registro' }}
      </h2>
      <p class="text-sm text-gray-600 mb-6">{{ modalMensaje }}</p>
      <button (click)="cerrarModal()" [ngClass]="modalExito ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'"
        class="cursor-pointer w-full text-white text-sm font-medium py-2.5 rounded-lg transition">
        {{ modalExito ? 'Ir al inicio de sesión' : 'Cerrar' }}
      </button>
    </div>
  </div>

  <div class="flex items-center justify-between mb-6">
    <app-section-header 
      title="Datos de Cuenta y Dirección" 
      badge="">
    </app-section-header>
  </div>

  <div class="border border-gray-200 rounded-xl overflow-hidden">
    <div class="bg-white p-5 border-b border-gray-200">
      <div class="mb-4">
        <app-section-header 
          title="Credenciales de acceso" 
          badge="">
        </app-section-header>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Correo Electrónico <span class="text-red-500">*</span></label>
          <input type="email" [(ngModel)]="correo" placeholder="ejemplo@correo.com"
            [ngClass]="{'border-red-400': correo && !correoValido}" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
          <p *ngIf="correo && !correoValido" class="text-xs text-red-500 mt-1">Correo inválido.</p>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Teléfono <span class="text-red-500">*</span></label>
          <input type="tel" [(ngModel)]="telefono" (input)="filtrarNumeros($event)" maxlength="9" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Contraseña <span class="text-red-500">*</span></label>
          <input type="password" [(ngModel)]="password" [ngClass]="{'border-red-400': password && !passwordValida}" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
          <p *ngIf="password && !passwordValida" class="text-xs text-red-500 mt-1">Mínimo 6 caracteres, una mayúscula y un símbolo.</p>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Repetir Contraseña <span class="text-red-500">*</span></label>
          <input type="password" [(ngModel)]="rePassword" [ngClass]="{'border-red-400': rePassword && !passwordsCoinciden}" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
          <p *ngIf="rePassword && !passwordsCoinciden" class="text-xs text-red-500 mt-1">No coinciden.</p>
        </div>
      </div>
    </div>

    <div class="bg-white p-5 border-b border-gray-200">
      <div class="mb-4">
        <app-section-header 
          title="Dirección del solicitante" 
          badge=""
          [divider]=false>
        </app-section-header>
      </div>

      <div class="mb-4">
        <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
          Denominación (Urb./Coop./AA.HH./Otros)<span class="text-red-500">*</span>
        </label>
        <input type="text" [(ngModel)]="denominacion" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Dirección <span class="text-red-500">*</span></label>
          <input type="text" [(ngModel)]="direccion" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Número</label>
          <input type="text" [(ngModel)]="numero" (input)="filtrarNumeros($event)" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Interior</label>
          <input type="text" [(ngModel)]="interior" placeholder="Interior" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Manzana</label>
          <input type="text" [(ngModel)]="manzana" placeholder="Mz." class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Lote</label>
          <input type="text" [(ngModel)]="lote" placeholder="Lt." class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
        </div>
      </div>
      <app-ubigeo-selector
        [departamento]="departamentoSeleccionado"
        [provincia]="provinciaSeleccionada"
        [distrito]="distritoSeleccionado"
        (departamentoChange)="departamentoSeleccionado = $event"
        (provinciaChange)="provinciaSeleccionada = $event"
        (distritoChange)="distritoSeleccionado = $event">
      </app-ubigeo-selector>
    </div>

    <div class="bg-white p-5">
      <div class="mb-4">
        <app-section-header 
          title="Información complementaria" 
          badge=""
          [divider]=false>
        </app-section-header>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div >
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
            Nro. RUC <span class="text-red-500">*</span>
          </label>
          <input type="text" [(ngModel)]="nroRuc" placeholder="Ingrese RUC" maxlength="11" (input)="filtrarNumeros($event)" 
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
            ¿Tiene discapacidad? <span class="text-red-500">*</span>
          </label>
          <select [(ngModel)]="tieneDiscapacidad" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg">
            <option value="">Seleccione</option>
            <option value="1">Sí</option>
            <option value="0">No</option>
          </select>
        </div>
      </div>
    </div>

    <app-nav-buttons
      backRoute="/registro/paso-1"
      [nextLabel]="cargando ? (state.paso1.tipoPersona === '2' ? 'Continuando...' : 'Finalizando...') : (state.paso1.tipoPersona === '2' ? 'Continuar' : 'Finalizar registro')"
      [nextDisabled]="!formularioValido || cargando"
      (next)="siguiente()">
    </app-nav-buttons>
  </div>
</div>
