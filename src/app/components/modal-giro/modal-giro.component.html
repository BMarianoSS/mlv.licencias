<app-modal-wrapper title="Seleccionar giro" width="600px" maxHeight="80vh" (cerrar)="cerrar.emit()" bodyClass="p-0"
  [loading]="cargando" loadingText="Cargando giros...">
  <div class="px-5 py-4 border-b border-gray-100 bg-[#F7F9FC]">
    <div class="relative">
      <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[18px]">search</span>
      <input type="text" [(ngModel)]="busqueda"
        placeholder="Buscar por código o descripción..."
        class="w-full pl-9 pr-4 py-2.5 text-sm text-gray-700 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#1A6DB5] focus:border-transparent outline-none transition bg-white" />
    </div>
    <p class="text-[11px] text-gray-400 mt-2 flex items-center gap-1">
      <span class="material-icons text-[13px]">info</span>
      Si su giro no aparece, solicite su licencia de forma presencial.
    </p>
  </div>

  <div class="overflow-y-auto" style="max-height: calc(80vh - 180px);">
    <div *ngIf="!cargando">
      <table class="w-full text-sm">
        <thead class="sticky top-0 z-10">
          <tr style="background:#F7F9FC;">
            <th class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest text-left border-b border-gray-200">Código</th>
            <th class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest text-left border-b border-gray-200">Descripción</th>
            <th class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest text-center border-b border-gray-200">Acción</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 bg-white">
          <tr *ngFor="let giro of catalogoFiltrado"
            class="hover:bg-[#E8F0FE]/40 transition-colors">
            <td class="px-4 py-3 font-mono text-xs text-gray-600 w-32">{{ giro.coduso }}</td>
            <td class="px-4 py-3 text-sm text-gray-800">{{ giro.descripcion }}</td>
            <td class="px-4 py-3 text-center">
              <button (click)="seleccionar(giro)"
                class="inline-flex items-center gap-1 text-[11px] font-semibold px-3 py-1.5 rounded-lg bg-[#1A6DB5] hover:bg-[#0F2D5C] text-white transition">
                <span class="material-icons text-[13px]">add</span>
                Elegir
              </button>
            </td>
          </tr>
          <tr *ngIf="catalogoFiltrado.length === 0">
            <td colspan="3" class="py-12 text-center">
              <span class="material-icons text-gray-300 text-4xl block mb-2">search_off</span>
              <p class="text-sm text-gray-400">No se encontraron giros con ese criterio.</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</app-modal-wrapper>
