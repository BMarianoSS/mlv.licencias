<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-xl w-[560px] max-h-[80vh] flex flex-col overflow-hidden">
    <div class="bg-blue-700 px-5 py-3 flex justify-between items-center flex-shrink-0">
      <span class="text-white font-medium text-sm uppercase tracking-widest">
        Seleccionar giro
      </span>
      <button (click)="cerrar.emit()" class="text-white/80 hover:text-white text-2xl leading-none transition">&times;</button>
    </div>

    <div class="p-4 border-b border-gray-200">
      <input 
        type="text" 
        [(ngModel)]="busqueda" 
        placeholder="Buscar por código o descripción..."
        class="w-full px-3 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
      />
    </div>

    <div class="p-4 overflow-y-auto flex-1">
      <div *ngIf="cargando" class="text-center py-8">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-700"></div>
        <p class="mt-2 text-sm text-gray-500">Cargando giros...</p>
      </div>

      <div *ngIf="!cargando" class="border border-gray-200 rounded-lg overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Código</th>
              <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descripción</th>
              <th class="px-3 py-2 text-center text-xs font-medium text-gray-500 uppercase tracking-wider w-20">Acción</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <tr *ngFor="let g of catalogoFiltrado" class="hover:bg-gray-50 transition">
              <td class="px-3 py-2 text-gray-700 font-mono text-xs">{{ g.coduso }}</td>
              <td class="px-3 py-2 text-gray-600">{{ g.descripcion }}</td>
              <td class="px-3 py-2 text-center">
                <button 
                  (click)="seleccionar(g)"
                  class="inline-flex items-center gap-1 text-xs font-medium px-3 py-1.5 rounded-md bg-blue-700 hover:bg-blue-800 text-blue-50 transition">
                  Elegir
                </button>
              </td>
            </tr>
            <tr *ngIf="catalogoFiltrado.length === 0">
              <td colspan="3" class="text-center py-4 text-gray-400 text-sm">
                No se encontraron giros
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="px-4 py-3 border-t border-gray-200 flex justify-end flex-shrink-0">
      <button 
        (click)="cerrar.emit()"
        class="inline-flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-4 py-2 rounded-lg transition">
        Cerrar
      </button>
    </div>
  </div>
</div>
