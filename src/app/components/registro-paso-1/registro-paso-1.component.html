<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <span class="text-xs font-medium text-gray-500 uppercase tracking-widest">
      Datos Personales
    </span>
  </div>

  <div class="border border-gray-200 rounded-xl overflow-hidden">
    <div class="bg-white p-5 border-b border-gray-200">

      <div class="mb-4">
        <span class="text-xs font-medium text-gray-500 uppercase tracking-widest">
          Información del solicitante
        </span>
        <div class="h-px bg-gray-200 mt-2 mb-4"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div>
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
            Tipo de Persona <span class="text-red-500">*</span>
          </label>
          <select [(ngModel)]="tipoPersonaSeleccionada"
            class="w-full px-3 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            <option value="">Seleccione</option>
            <option *ngFor="let t of tipoPersonas" [value]="t.idTipoPersona">{{ t.descripcion }}</option>
          </select>
        </div>
        <ng-container *ngIf="tipoPersonaSeleccionada === '1'">
          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
              Tipo de Documento <span class="text-red-500">*</span>
            </label>
            <select [(ngModel)]="tipoDocumentoSeleccionado"
              class="w-full px-3 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
              <option value="">Seleccione</option>
              <option *ngFor="let d of tipoDocumentos" [value]="d.idTipoDoc">{{ d.descDocumento }}</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
              Nro. Documento <span class="text-red-500">*</span>
            </label>
            <input type="text" [(ngModel)]="nroDocumento" placeholder="Ingrese número de documento" (input)="filtrarNumeros($event)" maxlength="11"
              class="w-full px-3 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          </div>
        
          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
              Nombres <span class="text-red-500">*</span>
            </label>
            <input type="text" [(ngModel)]="nombres" placeholder="Ingrese nombres"
              class="w-full px-3 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
              Apellido Paterno <span class="text-red-500">*</span>
            </label>
            <input type="text" [(ngModel)]="apellidoPaterno" placeholder="Ingrese apellido paterno"
              class="w-full px-3 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
              Apellido Materno <span class="text-red-500">*</span>
            </label>
            <input type="text" [(ngModel)]="apellidoMaterno" placeholder="Ingrese apellido materno"
              class="w-full px-3 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          </div>
        </ng-container>

        <ng-container *ngIf="tipoPersonaSeleccionada === '2'">
          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
              Razón Social <span class="text-red-500">*</span>
            </label>
            <input type="text" [(ngModel)]="razonSocial" placeholder="Ingrese razón social"
              class="w-full px-3 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
          </div>
        </ng-container>

      </div>
    </div>

    <div class="bg-gray-50 px-5 py-4 flex justify-between gap-3">
      <button [routerLink]="['/login']"
        class="inline-flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-5 py-2.5 rounded-lg transition">
        ← Cancelar
      </button>
      <button (click)="siguiente()" [disabled]="!formularioValido"
        class="inline-flex items-center gap-2 bg-blue-700 hover:bg-blue-800 text-blue-50 text-sm font-medium px-6 py-2.5 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
        Continuar <span class="text-base leading-none">→</span>
      </button>
    </div>
  </div>
</div>
