<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <app-section-header 
      title="Datos Personales" 
      badge="">
    </app-section-header>
  </div>

  <div class="border border-gray-200 rounded-xl overflow-hidden">
    <div class="bg-white p-5 border-b border-gray-200">

      <div class="mb-4">
        <app-section-header 
          title="Información del solicitante" 
          badge="">
        </app-section-header>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <app-form-field label="Tipo de Persona" type="select" [required]="true" [(ngModel)]="tipoPersonaSeleccionada">
          <option *ngFor="let t of tipoPersonas" [value]="t.idTipoPersona">{{ t.descripcion }}</option>
        </app-form-field>

        <ng-container *ngIf="tipoPersonaSeleccionada === '1'">
          <app-form-field label="Tipo de Documento" type="select" [required]="true" [(ngModel)]="tipoDocumentoSeleccionado">
            <option *ngFor="let d of tipoDocumentos" [value]="d.idTipoDoc">{{ d.descDocumento }}</option>
          </app-form-field>

          <app-form-field label="Nro. Documento" [required]="true" [maxlength]="11"
            [(ngModel)]="nroDocumento"
            (ngModelChange)="nroDocumento = $event.replace(/[^0-9]/g,'')">
          </app-form-field>

          <app-form-field label="Nombres" [required]="true" placeholder="Ingrese nombres" [(ngModel)]="nombres"></app-form-field>
          <app-form-field label="Apellido Paterno" [required]="true" placeholder="Ingrese apellido paterno" [(ngModel)]="apellidoPaterno"></app-form-field>
          <app-form-field label="Apellido Materno" [required]="true" placeholder="Ingrese apellido materno" [(ngModel)]="apellidoMaterno"></app-form-field>
        </ng-container>

        <ng-container *ngIf="tipoPersonaSeleccionada === '2'">
          <div class="md:col-span-2">
            <app-form-field label="Razón Social" [required]="true" placeholder="Ingrese razón social" [(ngModel)]="razonSocial"></app-form-field>
          </div>
        </ng-container>

      </div>
    </div>

    <app-nav-buttons
      backRoute="/login"
      backLabel="Cancelar"
      [nextDisabled]="!formularioValido"
      (next)="siguiente()">
    </app-nav-buttons>
  </div>
</div>
