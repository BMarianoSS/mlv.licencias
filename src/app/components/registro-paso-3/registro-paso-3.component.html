<div class="p-6">
  <!-- Modal -->
  <div *ngIf="mostrarModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8 text-center">
      <div [ngClass]="modalExito ? 'text-green-500' : 'text-red-500'" class="text-5xl mb-4">
        {{ modalExito ? '✅' : '❌' }}
      </div>
      <h2 class="text-lg font-bold text-gray-800 mb-2">
        {{ modalExito ? '¡Registro exitoso!' : 'Error en el registro' }}
      </h2>
      <p class="text-sm text-gray-600 mb-6">{{ modalMensaje }}</p>
      <button (click)="cerrarModal()"
        [ngClass]="modalExito ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'"
        class="cursor-pointer w-full text-white text-sm font-medium py-2.5 rounded-lg transition">
        {{ modalExito ? 'Ir al inicio de sesión' : 'Cerrar' }}
      </button>
    </div>
  </div>

  <div class="flex items-center justify-between mb-6">
    <app-section-header 
      title="Representante Legal" 
      badge="">
    </app-section-header>
  </div>

  <div class="border border-gray-200 rounded-xl overflow-hidden">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="md:col-span-2">
        <app-form-field label="Nombre completo" [required]="true" 
          placeholder="Nombre del representante legal" [(ngModel)]="repNombre">
        </app-form-field>
      </div>

      <app-form-field label="Tipo de Documento" type="select" [required]="true" [(ngModel)]="repTipoDocumentoSeleccionado">
        <option *ngFor="let d of repTipoDocumentos" [value]="d.idTipoDoc">{{ d.descDocumento }}</option>
      </app-form-field>

      <app-form-field label="Nro. Documento" [required]="true" [maxlength]="9"
        placeholder="Ingrese número de documento" [(ngModel)]="repNroDocumento"
        (ngModelChange)="repNroDocumento = filterNumbersNroDocumento($event)">
      </app-form-field>

      <app-form-field label="Nro. Partida"
        placeholder="Ingrese número de partida" [(ngModel)]="repNroPartida"
        (ngModelChange)="repNroPartida = filterNumbersNroPartida($event)">
      </app-form-field>

      <app-form-field label="Asiento SUNARP" 
        placeholder="Ingrese asiento SUNARP" [(ngModel)]="repAsientoSunarp">
      </app-form-field>

      <app-form-field label="Teléfono" type="tel" [required]="true" [maxlength]="9"
        placeholder="Ingrese teléfono" [(ngModel)]="repTelefono"
        (ngModelChange)="repTelefono = filterNumbersTelefono($event)">
      </app-form-field>
    </div>

    <app-nav-buttons
      backRoute="/registro/paso-2"
      [nextLabel]="cargando ? 'Finalizando...' : 'Finalizar registro'"
      [nextDisabled]="!formularioValido || cargando"
      (next)="registrar()">
    </app-nav-buttons>
  </div>
</div>
