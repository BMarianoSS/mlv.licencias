<app-modal-wrapper title="Preguntas del Anexo {{ nroAnexo }}" width="700px" maxHeight="88vh" bodyClass="p-0" (cerrar)="cerrar.emit()">
  <div class="overflow-y-auto px-6 py-5 space-y-3">
    <ng-container *ngFor="let p of preguntas">
      <div *ngIf="p.idTipoInput === 'tittle' && p.esVisible == '1'"
        class="text-center font-bold text-sm text-[#0F2D5C] py-2 border-b-2 border-[#1A6DB5]/20 mt-4">
        {{ p.pregunta }}
      </div>

      <div *ngIf="p.idTipoInput === 'subtittle' && p.esVisible == '1'"
        class="flex items-center gap-2 bg-[#E8F0FE] rounded-lg px-3 py-2 mt-2">
        <span class="w-1 h-4 rounded-full bg-[#1A6DB5] flex-shrink-0"></span>
        <span class="font-semibold text-sm text-[#0F2D5C]">{{ p.pregunta }}</span>
      </div>

      <div *ngIf="p.idTipoInput === 'no-type' && p.esVisible == '1'"
        class="text-xs text-gray-400 italic px-1">
        {{ p.pregunta }}
      </div>

      <div *ngIf="p.idTipoInput === 'check' && p.esVisible == '1'"
        class="flex items-start gap-3 bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 hover:bg-[#E8F0FE]/30 transition cursor-pointer">
        <label class="flex items-start gap-3 cursor-pointer w-full">
          <input type="checkbox" [(ngModel)]="respuestas[p.ngmodel]"
            class="mt-0.5 w-4 h-4 text-[#1A6DB5] border-gray-300 rounded focus:ring-2 focus:ring-[#1A6DB5] flex-shrink-0 cursor-pointer">
          <span class="text-sm text-gray-700 leading-relaxed select-none">{{ p.pregunta }}</span>
        </label>
      </div>

      <div *ngIf="p.idTipoInput === 'table' && p.esVisible == '1'" class="space-y-1.5">
        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">{{ p.pregunta }}</label>
        <div class="border border-gray-200 rounded-lg overflow-hidden">
          <table class="w-full text-sm">
            <thead style="background:#F7F9FC;">
              <tr>
                <th class="px-3 py-2 text-[10px] font-bold text-gray-500 uppercase tracking-widest text-left border-b border-gray-200">Código</th>
                <th class="px-3 py-2 text-[10px] font-bold text-gray-500 uppercase tracking-widest text-left border-b border-gray-200">Descripción</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              <tr *ngFor="let giro of respuestas[p.ngmodel] ?? []" class="hover:bg-gray-50">
                <td class="px-3 py-2 font-mono text-xs text-gray-600">{{ giro.coduso }}</td>
                <td class="px-3 py-2 text-gray-700">{{ giro.descGiros }}</td>
              </tr>
              <tr *ngIf="!(respuestas[p.ngmodel]?.length)">
                <td colspan="2" class="text-center py-6 text-gray-400 text-xs">
                  No hay giros registrados
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div *ngIf="p.idTipoInput === 'text' && p.esVisible == '1'" class="space-y-1.5">
        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">{{ p.pregunta }}</label>
        <input type="text" [(ngModel)]="respuestas[p.ngmodel]"
          class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1A6DB5] focus:border-transparent outline-none transition" />
      </div>

      <div *ngIf="p.idTipoInput === 'number' && p.esVisible == '1'" class="space-y-1.5">
        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">{{ p.pregunta }}</label>
        <input type="number" [(ngModel)]="respuestas[p.ngmodel]"
          class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1A6DB5] focus:border-transparent outline-none transition" />
      </div>

      <div *ngIf="p.idTipoInput === 'decimal' && p.esVisible == '1'" class="space-y-1.5">
        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">{{ p.pregunta }}</label>
        <input type="number" step="0.01" [(ngModel)]="respuestas[p.ngmodel]"
          class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1A6DB5] focus:border-transparent outline-none transition" />
      </div>

      <div *ngIf="p.idTipoInput === 'hora' && p.esVisible == '1'" class="space-y-1.5">
        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">{{ p.pregunta }}</label>
        <input type="time" [(ngModel)]="respuestas[p.ngmodel]"
          class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1A6DB5] focus:border-transparent outline-none transition" />
      </div>

      <div *ngIf="p.idTipoInput === 'combobox' && p.ngmodel === 'tipoDocumento' && p.esVisible == '1'" class="space-y-1.5">
        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">{{ p.pregunta }}</label>
        <select [(ngModel)]="respuestas[p.ngmodel]"
          class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1A6DB5] focus:border-transparent outline-none transition bg-white">
          <option value="">— Seleccione —</option>
          <option *ngFor="let t of tiposDocumento" [value]="t.idTipoDoc">{{ t.descDocumento }}</option>
        </select>
      </div>

      <ng-container *ngIf="p.idTipoInput === 'combobox' && p.ngmodel === 'departamento' && p.esVisible == '1'">
        <div class="space-y-1.5">
          <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">{{ p.pregunta }}</label>
          <app-ubigeo-selector
            [preload]="true"
            [departamento]="respuestas['departamento']"
            [provincia]="respuestas['provincia']"
            [distrito]="respuestas['distrito']"
            (departamentoChange)="respuestas['departamento'] = $event"
            (provinciaChange)="respuestas['provincia'] = $event"
            (distritoChange)="respuestas['distrito'] = $event"
            gridClass="grid grid-cols-1 gap-2">
          </app-ubigeo-selector>
        </div>
      </ng-container>
    </ng-container>
  </div>

  <ng-container slot="footer">
    <button (click)="guardar()"
      class="inline-flex items-center gap-1.5 bg-[#1A6DB5] hover:bg-[#0F2D5C] text-white text-sm font-semibold px-6 py-2.5 rounded-lg transition cursor-pointer">
      <span class="material-icons text-[16px]">save</span>
      Guardar respuestas
    </button>
  </ng-container>
</app-modal-wrapper>
