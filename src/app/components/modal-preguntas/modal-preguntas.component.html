<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[85vh] flex flex-col">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <span class="text-sm font-semibold text-gray-700 uppercase tracking-widest">
        Preguntas del Anexo {{ nroAnexo }}
      </span>
      <button (click)="cerrar.emit()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>

    <!-- Body -->
    <div class="overflow-y-auto px-6 py-5 space-y-4 flex-1">
      <ng-container *ngFor="let p of preguntas">

        <!-- Título -->
        <div *ngIf="p.idTipoInput === 'tittle' && p.esVisible == '1'"
          class="text-center font-bold text-base text-gray-800 pt-2 border-b border-gray-100 pb-2">
          {{ p.pregunta }}
        </div>

        <!-- Subtítulo -->
        <div *ngIf="p.idTipoInput === 'subtittle' && p.esVisible == '1'"
          class="font-semibold text-sm text-blue-700 bg-blue-50 px-3 py-1.5 rounded-md">
          {{ p.pregunta }}
        </div>

        <!-- Texto informativo -->
        <div *ngIf="p.idTipoInput === 'no-type' && p.esVisible == '1'"
          class="text-xs text-gray-500 italic">
          {{ p.pregunta }}
        </div>

        <!-- Checkbox -->
        <div *ngIf="p.idTipoInput === 'check' && p.esVisible == '1'"
          class="flex items-start gap-3 bg-gray-50 rounded-lg px-3 py-2.5">
          <input type="checkbox" [(ngModel)]="respuestas[p.ngmodel]"
            class="mt-0.5 w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 shrink-0">
          <span class="text-sm text-gray-700">{{ p.pregunta }}</span>
        </div>

        <!-- Tabla de giros -->
        <div *ngIf="p.idTipoInput === 'table' && p.esVisible == '1'" class="space-y-2">
          <div class="flex items-center justify-between">
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest">
              {{ p.pregunta }}
            </label>
          </div>
          <div class="border border-gray-200 rounded-lg overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Código</th>
                  <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Descripción</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                <tr *ngFor="let giro of respuestas[p.ngmodel] ?? []" class="hover:bg-gray-50">
                  <td class="px-3 py-2 text-gray-700">{{ giro.coduso }}</td>
                  <td class="px-3 py-2 text-gray-600">{{ giro.descGiros }}</td>
                </tr>
                <tr *ngIf="!(respuestas[p.ngmodel]?.length)">
                  <td colspan="2" class="text-center py-4 text-gray-400 text-sm">
                    No hay giros registrados
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Text -->
        <div *ngIf="p.idTipoInput === 'text' && p.esVisible == '1'" class="space-y-1">
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest">
            {{ p.pregunta }}
          </label>
          <input type="text" [(ngModel)]="respuestas[p.ngmodel]"
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <!-- Number -->
        <div *ngIf="p.idTipoInput === 'number' && p.esVisible == '1'" class="space-y-1">
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest">
            {{ p.pregunta }}
          </label>
          <input type="number" [(ngModel)]="respuestas[p.ngmodel]"
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <!-- Decimal -->
        <div *ngIf="p.idTipoInput === 'decimal' && p.esVisible == '1' " class="space-y-1">
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest">
            {{ p.pregunta }}
          </label>
          <input type="number" step="0.01" [(ngModel)]="respuestas[p.ngmodel]"
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <!-- Hora -->
        <div *ngIf="p.idTipoInput === 'hora' && p.esVisible == '1'" class="space-y-1">
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest">
            {{ p.pregunta }}
          </label>
          <input type="time" [(ngModel)]="respuestas[p.ngmodel]"
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <!-- Combobox -->
        <div *ngIf="p.idTipoInput === 'combobox' && p.esVisible == '1'" class="space-y-1">
          <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest">
            {{ p.pregunta }}
          </label>

          <select *ngIf="p.ngmodel === 'tipoDocumento' && p.esVisible == '1'" [(ngModel)]="respuestas[p.ngmodel]"
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">Seleccione</option>
            <option *ngFor="let t of tiposDocumento" [value]="t.idTipoDoc">{{ t.descDocumento }}</option>
          </select>

          <select *ngIf="p.ngmodel === 'departamento' && p.esVisible == '1'" [(ngModel)]="respuestas[p.ngmodel]"
            (ngModelChange)="onDepartamentoChange()"
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">Seleccione departamento</option>
            <option *ngFor="let d of departamentos" [value]="d.id">{{ d.nombre }}</option>
          </select>

          <select *ngIf="p.ngmodel === 'provincia' && p.esVisible == '1'" [(ngModel)]="respuestas[p.ngmodel]"
            (ngModelChange)="onProvinciaChange()"
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">Seleccione provincia</option>
            <option *ngFor="let pr of provincias" [value]="pr.id">{{ pr.nombre }}</option>
          </select>

          <select *ngIf="p.ngmodel === 'distrito' && p.esVisible == '1'" [(ngModel)]="respuestas[p.ngmodel]"
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">Seleccione distrito</option>
            <option *ngFor="let di of distritos" [value]="di.id">{{ di.nombre }}</option>
          </select>

        </div>
      </ng-container>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
      <button (click)="cerrar.emit()"
        class="text-sm font-medium px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition">
        Cancelar
      </button>
      <button (click)="guardar()"
        class="bg-blue-700 hover:bg-blue-800 text-white text-sm font-medium px-6 py-2.5 rounded-lg transition">
        Guardar
      </button>
    </div>

  </div>
</div>
