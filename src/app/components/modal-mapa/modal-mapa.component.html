<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-xl w-[900px] h-[65vh] flex flex-col overflow-hidden">
    <div class="bg-blue-700 px-5 py-3 flex justify-between items-center flex-shrink-0">
      <span class="text-white font-medium text-sm uppercase tracking-widest">
        Buscar predio
      </span>
      <button (click)="cerrar.emit()" class="text-white/80 hover:text-white text-2xl leading-none transition">&times;</button>
    </div>

    <div *ngIf="!cargando" class="p-4 border-b border-gray-200 flex-shrink-0">
      <input
        type="text"
        [(ngModel)]="busqueda"
        placeholder="Buscar por código o dirección..."
        class="w-full px-3 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
      />
    </div>

    <div class="flex flex-1 overflow-hidden min-h-0">
      <div class="flex-1 relative bg-gray-100">
        <div *ngIf="cargando" class="absolute inset-0 bg-white/90 flex items-center justify-center z-10">
          <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-b-2 border-blue-700"></div>
            <p class="mt-3 text-sm font-medium text-blue-700">Cargando predios...</p>
          </div>
        </div>
        <div #mapaContainer class="w-full h-full min-h-[400px]" style="z-index: 0;"></div>
      </div>

      <div class="w-[280px] flex flex-col border-l border-gray-200 bg-white overflow-hidden">
        <div class="bg-gray-50 px-4 py-2 text-xs font-medium text-gray-500 uppercase tracking-wider border-b border-gray-200 flex-shrink-0">
          Resultados ({{ prediosFiltrados.length }})
        </div>

        <div *ngIf="cargando" class="flex-1 flex items-center justify-center">
          <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-blue-700"></div>
            <p class="mt-2 text-xs text-gray-400">Cargando...</p>
          </div>
        </div>

        <ng-container *ngIf="!cargando">
          <div class="flex-1 overflow-y-auto">
            <div
              *ngFor="let p of prediosFiltrados"
              (click)="resaltarPredioPorCodigo(p.codPredio)"
              [class.bg-blue-50]="predioActivo?.codPredio === p.codPredio"
              [class.border-l-4]="predioActivo?.codPredio === p.codPredio"
              [class.border-l-blue-700]="predioActivo?.codPredio === p.codPredio"
              class="px-4 py-3 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition">
              <div class="font-semibold text-blue-700 text-sm">{{ p.codPredio }}</div>
              <div class="text-gray-500 text-xs mt-1">{{ p.direccion }}</div>
              <button
                *ngIf="predioActivo?.codPredio === p.codPredio"
                (click)="$event.stopPropagation(); seleccionar(p)"
                class="mt-2 w-full bg-blue-700 hover:bg-blue-800 text-white text-xs font-medium py-1.5 rounded-lg transition">
                Seleccionar este predio
              </button>
            </div>

            <div *ngIf="prediosFiltrados.length === 0" class="text-center py-8 text-gray-400 text-sm">
              No se encontraron resultados
            </div>
          </div>
        </ng-container>
      </div>

    </div>

    <div class="px-4 py-3 border-t border-gray-200 flex justify-end flex-shrink-0">
      <button 
        (click)="cerrar.emit()"
        class="inline-flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-4 py-2 rounded-lg transition">
        Cerrar
      </button>
    </div>
  </div>
</div>
