<div class="min-h-screen bg-gradient-to-b from-sky-400 to-blue-800 p-4 flex items-start justify-center pt-10">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-3xl overflow-hidden">
        <div class="bg-white border-b border-gray-200 px-8 pt-8 pb-0">
            <div class="flex flex-col items-center mb-6">
                <img src="https://web.munilavictoria.gob.pe/mlv/assets/imgs/logo.png" alt="Logo"
                    class="w-32 h-auto mb-3">
                <h1 class="text-lg font-bold text-blue-900 text-center uppercase tracking-wide">
                    Registro de usuario
                </h1>
                <p class="text-xs text-gray-500 mt-1">Complete los pasos para crear su cuenta</p>
            </div>

            <div class="flex items-center justify-between px-2 pb-0">
                <ng-container *ngFor="let paso of pasos; let i = index; let last = last">
                    <div class="flex flex-col items-center gap-1 cursor-pointer" (click)="irAPaso(i)">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-200"
                            [ngClass]="{
                            'bg-blue-700 text-white': pasoActual === i,
                            'bg-green-500 text-white': pasoActual > i,
                            'bg-gray-100 text-gray-400 border border-gray-300': pasoActual < i
                        }">
                            <span *ngIf="pasoActual <= i">{{ i + 1 }}</span>
                            <span *ngIf="pasoActual > i">✓</span>
                        </div>
                        <span class="text-xs font-medium hidden sm:block transition-colors duration-200" [ngClass]="{
                            'text-blue-700': pasoActual === i,
                            'text-green-600': pasoActual > i,
                            'text-gray-400': pasoActual < i
                        }">
                            {{ paso.label }}
                        </span>
                    </div>

                    <div *ngIf="!last" class="flex-1 h-px mx-1 mb-4 transition-colors duration-300"
                        [ngClass]="pasoActual > i ? 'bg-green-400' : 'bg-gray-200'">
                    </div>
                </ng-container>
            </div>
        </div>

        <div class="bg-gray-50 min-h-[420px]">
            <router-outlet></router-outlet>
        </div>

        <div class="border-t border-gray-100 px-8 py-3 bg-white text-center">
            <p class="text-xs text-gray-400">© 2025 Municipalidad de La Victoria</p>
        </div>
    </div>
</div>
