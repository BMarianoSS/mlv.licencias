<div class="min-h-screen flex" style="background: linear-gradient(160deg, #0F2D5C 0%, #1A6DB5 60%, #2d8fd4 100%);">
    <div class="hidden lg:flex flex-col justify-between w-2/5 p-12 relative overflow-hidden">
        <div class="absolute -top-20 -left-20 w-80 h-80 rounded-full bg-white/5"></div>
        <div class="absolute bottom-20 -right-10 w-60 h-60 rounded-full bg-white/5"></div>
        <div class="relative z-10 flex flex-col items-start">
            <div class="bg-white rounded-xl px-5 py-3 inline-block shadow-lg mb-8">
                <img src="https://web.munilavictoria.gob.pe/mlv/assets/imgs/logo.png" alt="Municipalidad de La Victoria"
                    class="h-11 w-auto" />
            </div>
            <h2 class="text-white text-3xl font-bold leading-tight mb-4">
                Crear<br />cuenta
            </h2>
            <p class="text-blue-200 text-sm leading-relaxed max-w-xs">
                Regístrate para poder solicitar y gestionar tus licencias de funcionamiento en línea.
            </p>
        </div>

        <div class="relative z-10 space-y-3">
            <ng-container *ngFor="let paso of pasos; let i = index">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 transition-all"
                        [ngClass]="{
                            'bg-white text-[#0F2D5C]':      pasoActual === i,
                            'bg-[#2ECC71] text-white':       pasoActual > i,
                            'bg-white/20 text-white/50':     pasoActual < i
                            }">
                        <span *ngIf="pasoActual > i" class="material-icons text-[14px]">check</span>
                        <span *ngIf="pasoActual <= i">{{ i + 1 }}</span>
                    </div>
                    <span class="text-sm transition-all" [ngClass]="{
                        'text-white font-semibold':  pasoActual === i,
                        'text-emerald-300':          pasoActual > i,
                        'text-white/40':             pasoActual < i
                        }">
                        {{ paso.label }}
                    </span>
                </div>
                <div *ngIf="i < pasos.length - 1" class="ml-4 w-px h-4 transition-colors"
                    [ngClass]="pasoActual > i ? 'bg-emerald-400' : 'bg-white/20'"></div>
            </ng-container>
        </div>
    </div>

    <div class="flex-1 flex items-start justify-center p-6 pt-10 lg:items-center lg:pt-6">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden">
            <div class="lg:hidden px-6 pt-6">
                <div class="flex items-center gap-1">
                    <ng-container *ngFor="let paso of pasos; let i = index; let last = last">
                        <div class="flex flex-col items-center gap-1 cursor-pointer" (click)="irAPaso(i)">
                            <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all"
                                [ngClass]="{
                                    'bg-[#1A6DB5] text-white':  pasoActual === i,
                                    'bg-[#2ECC71] text-white':   pasoActual > i,
                                    'bg-gray-100 text-gray-400': pasoActual < i
                                    }">
                                <span *ngIf="pasoActual > i" class="material-icons text-[12px]">check</span>
                                <span *ngIf="pasoActual <= i">{{ i + 1 }}</span>
                            </div>
                            <span class="text-[9px] font-medium hidden sm:block" [ngClass]="{
                                'text-[#1A6DB5]':  pasoActual === i,
                                'text-[#2ECC71]':  pasoActual > i,
                                'text-gray-400':   pasoActual < i
                                }">{{ paso.label }}</span>
                        </div>
                        <div *ngIf="!last" class="flex-1 h-px mb-4 transition-colors"
                            [ngClass]="pasoActual > i ? 'bg-[#2ECC71]' : 'bg-gray-200'"></div>
                    </ng-container>
                </div>
            </div>

            <div class="bg-[#F7F9FC] min-h-[420px]">
                <router-outlet></router-outlet>
            </div>

            <div class="border-t border-gray-100 px-8 py-3 bg-white text-center flex items-center justify-between">
                <a [routerLink]="['/login']"
                    class="text-xs text-[#1A6DB5] hover:text-[#0F2D5C] font-medium transition-colors flex items-center gap-1">
                    <span class="material-icons text-[14px]">arrow_back</span>
                    Ya tengo cuenta
                </a>
                <p class="text-[10px] text-gray-400">© 2026 Municipalidad de La Victoria</p>
            </div>
        </div>
    </div>
</div>
