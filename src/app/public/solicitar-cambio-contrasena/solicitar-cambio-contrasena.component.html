<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Card Principal -->
    <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
      <!-- Header -->
      <div class="bg-gradient-to-r from-blue-800 to-blue-600 px-6 py-8 text-white text-center">
        <div class="flex justify-center mb-4">
          <img src="https://web.munilavictoria.gob.pe/mlv/assets/imgs/logo.png" alt="Logo" class="w-20 h-auto">
        </div>
        <h2 class="text-2xl font-bold">Cambiar Contraseña</h2>
        <p class="text-blue-100 mt-2">Ingresa tu correo para recibir un código de verificación</p>
      </div>

      <!-- Contenido -->
      <div class="p-8">
        <!-- Mensaje de éxito -->
        <div *ngIf="messageSuccess" class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 rounded">
          <p class="text-green-700 text-sm">{{ messageSuccess }}</p>
        </div>

        <!-- Mensaje de error -->
        <div *ngIf="messageError" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded">
          <p class="text-red-700 text-sm">{{ messageError }}</p>
        </div>

        <!-- Formulario -->
        <form [formGroup]="form" (ngSubmit)="onSolicitar()" *ngIf="!messageSuccess">
          <!-- Campo de correo -->
          <div class="mb-6">
            <label for="correo" class="block text-sm font-medium text-gray-700 mb-2">
              Correo Electrónico
            </label>
            <input
              type="email"
              id="correo"
              formControlName="correo"
              placeholder="ejemplo@correo.com"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
              [class.border-red-500]="form.get('correo')?.invalid && form.get('correo')?.touched"
            />
            <p *ngIf="form.get('correo')?.invalid && form.get('correo')?.touched" class="text-red-500 text-xs mt-1">
              Ingresa un correo válido
            </p>
          </div>

          <!-- Botón enviar -->
          <button
            type="submit"
            [disabled]="form.invalid || loading"
            class="w-full bg-blue-700 hover:bg-blue-800 disabled:bg-gray-400 text-white font-bold py-3 rounded-lg transition duration-200 flex items-center justify-center gap-2"
          >
            <span *ngIf="!loading">Solicitar Código</span>
            <span *ngIf="loading" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Enviando...
            </span>
          </button>
        </form>

        <!-- Código enviado (apenas se envíe) -->
        <div *ngIf="codigoGenerado && messageSuccess" class="mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg">
          <p class="text-blue-900 text-sm font-medium mb-2">Código de verificación:</p>
          <p class="text-center text-2xl font-bold text-blue-700 tracking-widest">{{ codigoGenerado }}</p>
          <p class="text-blue-600 text-xs mt-2 text-center">Este código se mostrará en la siguiente pantalla automáticamente</p>
        </div>
      </div>

      <!-- Footer -->
      <div class="bg-gray-50 px-8 py-4 text-center border-t border-gray-200">
        <p class="text-gray-600 text-sm">
          ¿Recuerdas tu contraseña?
          <button (click)="irAlLogin()" class="text-blue-700 hover:text-blue-800 font-medium">
            Volver al login
          </button>
        </p>
      </div>
    </div>
  </div>
</div>
