<div class="min-h-screen bg-gradient-to-br from-blue-100 via-sky-100 to-indigo-200 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-blue-800 to-blue-600 px-8 py-10 text-white text-center">
        <img src="https://web.munilavictoria.gob.pe/mlv/assets/imgs/logo.png" alt="Logo" class="mx-auto mb-5 w-20 h-auto" />
        <h2 class="text-2xl font-bold">Recuperar Contraseña</h2>
        <p class="text-blue-100 mt-2">Solicita un código de verificación en tu correo.</p>
      </div>

      <div class="p-8 space-y-6">
        <div *ngIf="messageSuccess" class="p-4 bg-green-50 border-l-4 border-green-500 rounded-2xl">
          <p class="text-green-700 text-sm">{{ messageSuccess }}</p>
        </div>

        <div *ngIf="messageError" class="p-4 bg-red-50 border-l-4 border-red-500 rounded-2xl">
          <p class="text-red-700 text-sm">{{ messageError }}</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSolicitar()" *ngIf="!messageSuccess" class="space-y-6">
          <div>
            <label for="correo" class="block text-sm font-medium text-slate-700 mb-2">Correo electrónico</label>
            <input
              type="email"
              id="correo"
              formControlName="correo"
              placeholder="ejemplo@correo.com"
              class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
              [class.border-red-500]="form.get('correo')?.invalid && form.get('correo')?.touched"
            />
            <p *ngIf="form.get('correo')?.invalid && form.get('correo')?.touched" class="text-red-500 text-xs mt-1">
              Ingresa un correo válido.
            </p>
          </div>

          <button
            type="submit"
            [disabled]="form.invalid || loading"
            class="w-full bg-blue-700 hover:bg-blue-800 disabled:bg-gray-400 text-white font-bold py-3 rounded-2xl transition duration-200 flex items-center justify-center gap-2"
          >
            <span *ngIf="!loading">Solicitar Código</span>
            <span *ngIf="loading" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Enviando...
            </span>
          </button>
        </form>

        <div *ngIf="codigoGenerado && messageSuccess" class="p-4 bg-blue-50 border border-blue-200 rounded-2xl">
          <p class="text-blue-900 text-sm font-medium mb-2">Código de verificación</p>
          <p class="text-center text-2xl font-bold text-blue-700 tracking-widest">{{ codigoGenerado }}</p>
          <p class="text-blue-600 text-xs mt-2 text-center">El código se mostrará en la siguiente pantalla automáticamente.</p>
        </div>
      </div>

      <div class="bg-slate-50 px-8 py-5 text-center border-t border-slate-200">
        <p class="text-slate-600 text-sm">
          ¿Recuerdas tu contraseña?
          <a [routerLink]="['/login']" class="text-blue-600 hover:underline text-xs font-medium">Volver al login</a>
        </p>
      </div>
    </div>
  </div>
</div>
