<div class="p-6 md:p-8 mx-auto">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-lg font-bold text-gray-900">Mis solicitudes</h1>
            <p class="text-xs text-gray-500 mt-0.5">Historial de trámites de licencia de funcionamiento</p>
        </div>
        <a [routerLink]="['../pantalla1']"
            class="inline-flex items-center gap-1.5 bg-[#1A6DB5] hover:bg-[#0F2D5C] text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">
            <span class="material-icons text-[16px]">add</span>
            Nueva solicitud
        </a>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
        <app-data-table [columns]="columnasSolicitudes" [rows]="solicitudes"
            emptyText="No tienes solicitudes registradas aún." [actionsTpl]="accionesSolicitud">
        </app-data-table>

        <ng-template #accionesSolicitud let-row>
            <div class="flex items-center justify-center gap-1.5 flex-wrap">
                <button *ngIf="row.descripcionEstado === 'TRAMITE EN PROCESO'"
                    class="inline-flex items-center gap-1 text-[11px] font-semibold px-2.5 py-1 rounded-md bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 transition">
                    <span class="material-icons text-[12px]">payments</span>
                    Pagar
                </button>
                <button *ngIf="row.descripcionEstado === 'PROCEDENTE'" (click)="abrirDocumento(row.idSolicitud)"
                    class="inline-flex items-center gap-1 text-[11px] font-semibold px-2.5 py-1 rounded-md bg-blue-50 text-[#1A6DB5] border border-blue-200 hover:bg-blue-100 transition">
                    <span class="material-icons text-[12px]">download</span>
                    Licencia
                </button>
                <button *ngIf="row.descripcionEstado === 'TRAMITE EN PROCESO'"
                    (click)="abrirConfirmacionDesistir(row.idSolicitud)"
                    class="inline-flex items-center gap-1 text-[11px] font-semibold px-2.5 py-1 rounded-md bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 transition">
                    <span class="material-icons text-[12px]">cancel</span>
                    Desistir
                </button>
                <button (click)="abrirDetalle(row.idSolicitud)"
                    class="inline-flex items-center gap-1 text-[11px] font-semibold px-2.5 py-1 rounded-md bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200 transition">
                    <span class="material-icons text-[12px]">visibility</span>
                    Detalle
                </button>
            </div>
        </ng-template>
    </div>

    <app-generic-modal [visible]="modalConfirmarVisible" [type]="'confirm'" [title]="'¿Desistir de esta solicitud?'"
        [message]="'Esta acción no se puede deshacer.'" [confirmText]="'Sí, desistir'" [cancelText]="'Cancelar'"
        (confirm)="confirmarDesistir()" (close)="modalConfirmarVisible = false">
    </app-generic-modal>

    <app-generic-modal [visible]="modalRespuestaVisible" [type]="'info'" [message]="mensajeRespuesta"
        [confirmText]="'Cerrar'" (confirm)="cerrarModalRespuesta()" (close)="modalRespuestaVisible = false">
    </app-generic-modal>

    @if (modalDetalleVisible) {
    <app-modal-detalle-solicitud [id_solicitud]="idSolicitudDetalle"
        (cerrar)="cerrarDetalle()"></app-modal-detalle-solicitud>
    }
    
    @if (modalDocumentoVisible) {
    <app-modal-documento [id_solicitud]="idSolicitudDetalle" (cerrar)="cerrarDocumento()"></app-modal-documento>
    }
</div>
