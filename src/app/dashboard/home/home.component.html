<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <app-section-header title="Solicitudes registradas" badge=""></app-section-header>
        <button [routerLink]="['../pantalla1']"
            class="inline-flex items-center gap-1.5 bg-blue-700 hover:bg-blue-800 text-blue-50 text-sm font-medium px-4 py-2 rounded-lg transition">
            <span class="text-base leading-none">+</span> Nueva solicitud
        </button>
    </div>

    <div class="border border-gray-200 rounded-xl overflow-hidden">
        <app-data-table [columns]="columnasSolicitudes" [rows]="solicitudes" 
        emptyText="No hay solicitudes registradas" [actionsTpl]="accionesSolicitud">
        </app-data-table>

        <ng-template #accionesSolicitud let-row>
            <div class="flex items-center justify-center gap-2">
                <button *ngIf="row.descripcionEstado === 'TRAMITE EN PROCESO'" class="text-xs font-medium px-3 py-1.5 rounded-md border border-green-200
                    text-green-500 hover:bg-green-50 transition">
                    Pagar
                </button>
                <button *ngIf="row.descripcionEstado === 'PROCEDENTE'" 
                    (click)="abrirDocumento(row.idSolicitud)" class="text-xs font-medium px-3 py-1.5 rounded-md border border-blue-200
                    text-blue-500 hover:bg-blue-50 transition">
                    Ver Licencia
                </button>
                <button *ngIf="row.descripcionEstado === 'TRAMITE EN PROCESO'"
                    (click)="abrirConfirmacionDesistir(row.idSolicitud)" class="text-xs font-medium px-3 py-1.5 rounded-md border border-gray-200
                    text-gray-500 hover:bg-red-50 hover:text-red-700 transition">
                    Desistir
                </button>
                <button (click)="abrirDetalle(row.idSolicitud)" class="text-xs font-medium px-3 py-1.5 rounded-md border border-purple-200
                    text-purple-700 hover:bg-purple-50 transition">
                    Detalle
                </button>
            </div>
        </ng-template>
    </div>

    @if (modalConfirmarVisible) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
        <div
            [class]="'bg-white rounded-xl shadow-lg p-6 w-80 ' + (modalConfirmarLeaving ? 'modal-leave' : 'modal-enter')">
            <p class="text-gray-700 text-sm font-medium mb-5">¿Seguro que desea desistir de esta solicitud?</p>
            <div class="flex justify-end gap-2">
                <button (click)="cerrarModalConfirmar()"
                    class="text-xs px-4 py-2 rounded-md border border-gray-200 text-gray-500 hover:bg-gray-50 transition">
                    Cancelar
                </button>
                <button (click)="confirmarDesistir()"
                    class="text-xs px-4 py-2 rounded-md bg-red-600 text-white hover:bg-red-700 transition">
                    Sí, desistir
                </button>
            </div>
        </div>
    </div>
    }

    @if (modalRespuestaVisible) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
        <div
            [class]="'bg-white rounded-xl shadow-lg p-6 w-80 ' + (modalRespuestaLeaving ? 'modal-leave' : 'modal-enter')">
            <p class="text-gray-700 text-sm mb-5">{{ mensajeRespuesta }}</p>
            <div class="flex justify-end">
                <button (click)="cerrarModalRespuesta()"
                    class="text-xs px-4 py-2 rounded-md bg-blue-700 text-white hover:bg-blue-800 transition">
                    Cerrar
                </button>
            </div>
        </div>
    </div>
    }

    @if (modalDetalleVisible) {
    <app-modal-detalle-solicitud [id_solicitud]="idSolicitudDetalle" (cerrar)="cerrarDetalle()"></app-modal-detalle-solicitud>
    }

    @if (modalDocumentoVisible) {
    <app-modal-documento [id_solicitud]="idSolicitudDetalle" (cerrar)="cerrarDocumento()"></app-modal-documento>
    }
</div>
