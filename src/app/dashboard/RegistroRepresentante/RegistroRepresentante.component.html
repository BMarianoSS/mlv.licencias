<div class="p-6">
  <app-modal-representante *ngIf="mostrarModalRepresentante" [datosIniciales]="representanteParaEditar"
    (cerrar)="mostrarModalRepresentante = false" (representanteGuardado)="onRepresentanteGuardado($event)">
  </app-modal-representante>

  <div class="flex items-center justify-between mb-6">
    <span class="text-xs font-medium text-gray-500 uppercase tracking-widest">
      Representantes legales
    </span>
  </div>

  <div class="border border-gray-200 rounded-xl overflow-hidden">
    <div class="bg-gray-50 p-5 space-y-3">
      <div *ngIf="representantes.length === 0"
        class="bg-white border border-dashed border-gray-300 rounded-xl py-12 flex flex-col items-center justify-center gap-3">
        <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-2xl">👤</div>
        <p class="text-sm text-gray-500">No se encontraron representantes legales asociados</p>
      </div>

      <div *ngFor="let rep of representantes; let i = index"
        class="bg-white border border-gray-200 rounded-xl px-5 py-4 flex flex-col md:flex-row md:items-center gap-4">

        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-sm font-semibold uppercase">
          {{ rep.nombreRL.charAt(0) || '?' }}
        </div>

        <div class="flex-1 min-w-0">
          <div class="flex flex-wrap items-center gap-2 mb-1">
            <span class="text-sm font-semibold text-gray-800">{{ rep.nombreRL }}</span>
            <span class="inline-flex items-center text-xs font-medium bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full border border-blue-100">
              {{ getNombreTipoDoc(rep.tipoDoc) }}
            </span>
          </div>
          <div class="flex flex-wrap gap-x-5 gap-y-1 text-xs text-gray-500">
            <span class="flex items-center gap-1">
              <span class="text-gray-400">N° Doc:</span>
              <span class="font-mono text-gray-700">{{ rep.nroDoc }}</span>
            </span>
            <span *ngIf="rep.nroPartida" class="flex items-center gap-1">
              <span class="text-gray-400">Partida:</span>
              <span class="text-gray-700">{{ rep.nroPartida }}</span>
            </span>
            <span *ngIf="rep.telefono" class="flex items-center gap-1">
              <span class="text-gray-400">Teléfono:</span>
              <span class="text-gray-700">{{ rep.telefono }}</span>
            </span>
          </div>
        </div>

        <div class="flex-shrink-0">
          <button (click)="abrirModalEditar(i)"
            class="text-xs font-medium px-3 py-1.5 rounded-md border border-blue-200 text-blue-600 hover:bg-blue-50 hover:border-blue-300 transition">
            Editar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
