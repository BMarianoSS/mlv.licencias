<div class="flex flex-col h-screen bg-gray-100">
  <div class="flex flex-1 overflow-x-auto">
    
    <aside class="w-64 bg-blue-800 text-white flex-shrink-0 hidden md:flex flex-col shadow-lg">
      <div class="flex items-center justify-center p-4 m-3 bg-white rounded-xl shadow-md">
        <img src="https://web.munilavictoria.gob.pe/mlv/assets/imgs/logo.png" alt="Logo" class="w-32 h-auto" />
      </div>

      <nav class="mt-4 flex-1 px-3">
        <ul class="space-y-1.5">
          <li [routerLink]="['/dashboard/principal']"
            class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-blue-700 cursor-pointer transition-all duration-200 text-sm font-medium">
            <span class="material-icons text-base">home</span>
            Inicio
          </li>
          <li [routerLink]="['/dashboard/home']"
            class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-blue-700 cursor-pointer transition-all duration-200 text-sm font-medium">
            <span class="material-icons text-base">inbox</span>
            Ver solicitudes
          </li>
          <li [routerLink]="['/dashboard/RegistroRepresentante']"
            class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-blue-700 cursor-pointer transition-all duration-200 text-sm font-medium">
            <span class="material-icons text-base">person</span>
            Datos del representante
          </li>
        </ul>
      </nav>
    </aside>

    <div *ngIf="sidebarOpen" class="fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden" (click)="toggleSidebar()">
    </div>

    <aside *ngIf="sidebarOpen"
      class="fixed inset-y-0 left-0 w-64 bg-blue-800 text-white z-50 md:hidden transition-transform transform translate-x-0 duration-300 shadow-xl">
      <div class="flex items-center justify-between p-3 border-b border-blue-700 bg-blue-800">
        <div class="flex-1 flex justify-center">
          <div class="bg-white rounded-lg p-2">
            <img src="https://web.munilavictoria.gob.pe/mlv/assets/imgs/logo.png" alt="Logo" class="w-28 h-auto" />
          </div>
        </div>
        <button (click)="toggleSidebar()" class="text-white hover:text-blue-200 text-2xl leading-none">&times;</button>
      </div>
      <nav class="mt-2 px-3">
        <ul class="space-y-1.5">
          <li [routerLink]="['/dashboard/principal']"
            class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-blue-700 cursor-pointer transition-all duration-200 text-sm font-medium">
            <span class="material-icons text-base">home</span>
            Inicio
          </li>
          <li [routerLink]="['/dashboard/home']"
            class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-blue-700 cursor-pointer transition-all duration-200 text-sm font-medium">
            <span class="material-icons text-base">inbox</span>
            Ver solicitudes
          </li>
          <li [routerLink]="['/dashboard/RegistroRepresentante']"
            class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-blue-700 cursor-pointer transition-all duration-200 text-sm font-medium">
            <span class="material-icons text-base">person</span>
            Datos del representante
          </li>
        </ul>
      </nav>
    </aside>

    <div class="flex flex-col flex-1 min-w-0">
      <header class="flex justify-between items-center bg-white shadow-sm px-6 py-3 border-b border-gray-200">
        <button class="md:hidden text-blue-700 hover:text-blue-800 text-2xl" (click)="toggleSidebar()">
          ☰
        </button>
        <div class="flex-1"></div>
        <div class="flex items-center gap-3">
          <span class="text-sm font-medium text-gray-700">{{ nombreUsuario }}</span>
          <button 
            class="inline-flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition duration-200"
            (click)="logout()">
            <span class="material-icons text-sm">logout</span>
            Salir
          </button>
        </div>
      </header>

      <main class="flex-1 p-6 bg-gray-50 overflow-x-hidden overflow-y-auto">
        <router-outlet></router-outlet>
      </main>

      <footer class="bg-white text-gray-500 text-center py-3 text-xs border-t border-gray-200 shadow-inner">
        © 2026 Municipalidad de La Victoria - Todos los derechos reservados.
      </footer>      
    </div>
  </div>
</div>
