<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <span class="text-xs font-medium text-gray-500 uppercase tracking-widest">
      Resultado de la solicitud
    </span>
  </div>

  <div class="border border-gray-200 rounded-xl overflow-hidden">
    <div class="bg-white p-8 border-b border-gray-200 text-center">
      <div class="mb-5">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-4">
          <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <div class="h-px bg-gray-200 my-4"></div>
      </div>

      <div class="mb-8">
        <span class="text-2xl font-bold text-green-600 uppercase tracking-wider">
          RESULTADO PROCEDENTE
        </span>
        <div class="h-px bg-gray-200 mt-4"></div>
      </div>

      <div class="mb-8">
        <p class="text-gray-600 text-sm">
          Su solicitud ha sido <span class="font-semibold text-green-600">APROBADA</span> exitosamente.
          A continuación, puede descargar los documentos generados.
        </p>
      </div>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <button
          class="inline-flex items-center gap-2 bg-blue-700 hover:bg-blue-800 text-blue-50 text-sm font-medium px-6 py-2.5 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
          </svg>
          Descargar licencia
        </button>
        <!--
        <button
          class="inline-flex items-center gap-2 bg-blue-700 hover:bg-blue-800 text-blue-50 text-sm font-medium px-6 py-2.5 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
          </svg>
          Descargar ITSE
        </button>
        -->
      </div>
    </div>

    <div class="bg-gray-50 px-5 py-4 flex justify-end gap-3">
      <button 
        [routerLink]="['../home']"
        class="inline-flex items-center gap-2 bg-blue-700 hover:bg-blue-800 text-blue-50 text-sm font-medium px-6 py-2.5 rounded-lg transition">
        Continuar
        <span class="text-base leading-none">→</span>
      </button>
    </div>
  </div>
</div>
