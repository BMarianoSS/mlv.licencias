<div class="p-6 md:p-8 mx-auto">
    <div class="flex items-center gap-2 mb-6">
        <div
            class="flex items-center justify-center w-7 h-7 rounded-full bg-[#2ECC71] text-white text-xs flex-shrink-0">
            <span class="material-icons text-[13px]">check</span>
        </div>
        <div class="h-px flex-1 bg-[#2ECC71]"></div>
        <div
            class="flex items-center justify-center w-7 h-7 rounded-full bg-[#2ECC71] text-white text-xs flex-shrink-0">
            <span class="material-icons text-[13px]">check</span>
        </div>
        <div class="h-px flex-1 bg-[#1A6DB5]"></div>
        <div
            class="flex items-center justify-center w-7 h-7 rounded-full bg-[#1A6DB5] text-white text-xs font-bold flex-shrink-0">
            3</div>
        <div class="h-px flex-1 bg-gray-200"></div>
        <div
            class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-200 text-gray-400 text-xs font-bold flex-shrink-0">
            4</div>
        <div class="h-px flex-1 bg-gray-200"></div>
        <div
            class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-200 text-gray-400 text-xs font-bold flex-shrink-0">
            5</div>
    </div>

    <div class="mb-5">
        <h1 class="text-lg font-bold text-gray-900">Autorización sectorial</h1>
        <p class="text-xs text-gray-500 mt-0.5">Adjunta la documentación de autorización sectorial si corresponde</p>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm mb-4">
        <div class="border-l-4 border-[#1A6DB5] px-5 py-4">
            <div class="flex items-center gap-2 mb-4">
                <span class="material-icons text-[#1A6DB5] text-[18px]">verified</span>
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Datos de la
                    autorización</span>
                <span class="text-[10px] text-gray-400 font-medium normal-case tracking-normal">(de corresponder)</span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <app-form-field label="Entidad que otorga autorización"
                    [(ngModel)]="ASentidadautoriza"></app-form-field>
                <app-form-field label="Denominación de la autorización sectorial"
                    [(ngModel)]="ASdenominacion"></app-form-field>
                <app-form-field label="Fecha de autorización" type="date" [(ngModel)]="ASfecha"></app-form-field>
                <app-form-field label="Número de autorización" [(ngModel)]="ASnumero"
                    (ngModelChange)="ASnumero = filterNumbersASnumero($event)">
                </app-form-field>
            </div>

            <div class="bg-[#F7F9FC] border border-gray-200 rounded-xl px-4 py-4">
                <div class="flex items-center gap-2 mb-3">
                    <span class="material-icons text-gray-400 text-[16px]">attach_file</span>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Archivo adjunto</span>
                </div>
                <input type="file" (change)="onFileAS($event)"
                    class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-[#1A6DB5] file:text-white hover:file:bg-[#0F2D5C] transition cursor-pointer">
            </div>
        </div>
    </div>

    <app-nav-buttons backRoute="../pantalla2" nextRoute="../pantalla4" (back)="guardarState()" (next)="guardarState()">
    </app-nav-buttons>
</div>
