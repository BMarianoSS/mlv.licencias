<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <app-section-header 
            title="Acreditación de documentación" 
            badge="">
        </app-section-header>
    </div>

    <div class="border border-gray-200 rounded-xl overflow-hidden">
        <div class="bg-white p-5 border-b border-gray-200">
            <div class="mb-4">
                <app-section-header 
                    title="Autorización sectorial" 
                    badge="(de corresponder)">
                </app-section-header>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <app-form-field label="Entidad que otorga autorización" [(ngModel)]="ASentidadautoriza"></app-form-field>
                <app-form-field label="Denominación de la autorización sectorial" [(ngModel)]="ASdenominacion"></app-form-field>
                <app-form-field label="Fecha de autorización" type="date" [(ngModel)]="ASfecha"></app-form-field>
                <app-form-field label="Número de autorización" [(ngModel)]="ASnumero"
                    (ngModelChange)="ASnumero = $event.replace(/[^0-9]/g,'')">
                </app-form-field>
            </div>

            <div class="flex flex-col sm:flex-row items-start sm:items-end gap-4">
                <div class="flex-1 w-full">
                    <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">
                        Archivo
                    </label>
                    <input type="file" (change)="onFileAS($event)"
                        class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 transition">
                </div>
            </div>
        </div>

        <app-nav-buttons
            backRoute="../pantalla2"
            nextRoute="../pantalla4"
            (back)="guardarState()"
            (next)="guardarState()">
        </app-nav-buttons>
    </div>
</div>
