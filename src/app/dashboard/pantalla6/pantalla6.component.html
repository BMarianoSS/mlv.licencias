<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <span class="text-xs font-medium text-gray-500 uppercase tracking-widest">
            Orden de pago
        </span>
    </div>

    <div class="border border-gray-200 rounded-xl overflow-hidden">
        <div class="bg-white p-6 border-b border-gray-200">
            <div class="mb-5">
                <span class="text-xs font-medium text-gray-500 uppercase tracking-widest">
                    Detalles del pago
                </span>
                <div class="h-px bg-gray-200 mt-2 mb-4"></div>
            </div>

            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                <div *ngIf="mensaje" class="mb-4 p-4 bg-green-50 border border-green-200 rounded-lg text-green-800 text-sm">
                {{ mensaje }} — N° Solicitud: <span class="font-mono font-semibold">{{ idSolicitud }}</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-600 uppercase tracking-widest">Total a pagar</span>
                    <span class="text-2xl font-bold text-blue-700">S/.{{monto}}</span>
                </div>
            </div>

            <div class="mb-4">
                <span class="text-xs font-medium text-gray-500 uppercase tracking-widest">
                    Otras opciones de pago
                </span>
                <div class="h-px bg-gray-200 mt-2 mb-4"></div>
            </div>

            <div class="space-y-3">
                <div
                    class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
                    <div class="flex items-center gap-3">
                        <button
                            class="inline-flex items-center gap-1.5 bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
                            Pago online
                        </button>
                        <span class="text-sm text-gray-500">PROFORMA: <span
                                class="font-mono font-semibold text-gray-700">{{nroProforma}}</span></span>
                    </div>
                </div>                
                <div
                    class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-500">Tambien puede hacer el pago en Ventanilla en otro momento con el numero de proforma.</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 px-6 py-5 flex justify-center border-b border-gray-200">
            <button
                class="inline-flex items-center gap-2 bg-blue-700 hover:bg-blue-800 text-blue-50 text-base font-semibold px-8 py-3 rounded-lg transition shadow-sm">
                Procesar pago
                <span class="text-lg leading-none">→</span>
            </button>
        </div>

        <div class="bg-white px-5 py-4 flex justify-end gap-3">
            <!---->
            <button [routerLink]="['../pantalla5']"
                class="inline-flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-5 py-2.5 rounded-lg transition">
                ← Regresar
            </button>
            
            <button [routerLink]="['../pantalla6-2']" (click)="irAPantalla62()"
                class="inline-flex items-center gap-2 bg-blue-700 hover:bg-blue-800 text-blue-50 text-sm font-medium px-6 py-2.5 rounded-lg transition">
                Continuar
                <span class="text-base leading-none">→</span>
            </button>
        </div>
    </div>
</div>
